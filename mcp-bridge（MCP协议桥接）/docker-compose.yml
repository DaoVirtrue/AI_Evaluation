version: "3.9"

services:
  mcp-bridge:
    build: .
    image: mcp-bridge:dev
    ports:
      - "8004:8004"
    environment:
      - AUDIT_SECRET=dev-audit-secret
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
