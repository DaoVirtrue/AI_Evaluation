version: "3.9"
services:
  backend:
    build: ./backend
    image: agent-eval-api:dev
    ports: ["8000:8000"]
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./eval.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s; timeout: 10s; retries: 3; start_period: 30s
    deploy: {resources: {limits: {memory: 256M, cpus: '0.5'}}}
    restart: unless-stopped
    security_opt: [no-new-privileges:true]

  frontend:
    build: ./frontend
    image: agent-eval-frontend:dev
    ports: ["3000:3000"]
    depends_on: [backend]
    deploy: {resources: {limits: {memory: 128M, cpus: '0.3'}}}
    restart: unless-stopped
