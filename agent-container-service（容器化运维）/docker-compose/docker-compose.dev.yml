# Dev mode — 7GB Docker Desktop compatible
version: "3.9"
x-security: &sec
  security_opt: [no-new-privileges:true]
  read_only: true

services:
  postgres:
    image: postgres:16-alpine
    environment: {POSTGRES_USER: agent, POSTGRES_PASSWORD: devpass, POSTGRES_DB: agent_eval}
    command: postgres -c shared_buffers=64MB -c max_connections=50
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U agent"], interval: 30s, timeout: 10s, retries: 3}
    deploy: {resources: {limits: {memory: 256M, cpus: '0.3'}}}
    <<: *sec

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64MB --save ""
    healthcheck: {test: ["CMD", "redis-cli", "ping"], interval: 30s, timeout: 10s, retries: 3}
    deploy: {resources: {limits: {memory: 64M, cpus: '0.2'}}}
    <<: *sec
