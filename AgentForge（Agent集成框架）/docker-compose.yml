version: "3.9"
services:
  agent-forge:
    build: .
    image: agent-forge:dev
    ports:
      - "8001:8001"
    environment:
      - LOG_LEVEL=INFO
      - TOKEN_CORE_URL=http://token-core:8003
      - MCP_BRIDGE_URL=http://mcp-bridge:8004
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits: {cpus: '0.5', memory: 256M}
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
